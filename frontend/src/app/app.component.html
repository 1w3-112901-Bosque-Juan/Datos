<!-- Splash Screen -->
<div class="splash-screen" [class.shrink]="splashDone" [class.hidden]="!showSplash">
  <div class="splash-content" [class.fade-out]="splashDone">
    <svg class="splash-logo" viewBox="0 0 64 64" width="150" height="150">
      <rect
        x="8"
        y="12"
        width="48"
        height="32"
        rx="2"
        fill="#fff"
        stroke="#1a73e8"
        stroke-width="2"
      />
      <rect x="12" y="16" width="40" height="24" fill="#e3f2fd" />
      <path d="M4 44 L60 44 L56 50 L8 50 Z" fill="#1a73e8" />
      <rect x="28" y="50" width="8" height="4" fill="#0d47a1" />
    </svg>
    <h1 class="splash-title">TechStore</h1>
    <p class="splash-subtitle">Tu tienda de tecnología favorita</p>
  </div>
</div>

<!-- Main Content -->
<div
  class="main-content"
  [class.visible]="splashDone"
  [class.ready]="!showSplash"
  (click)="closeCartDropdown($event)"
>
  <nav class="navbar">
    <div class="nav-brand">
      <a routerLink="/login">Login</a>
      <a routerLink="/catalog">Catálogo</a>
    </div>
    <div class="nav-cart">
      <div class="cart-icon-wrapper" (click)="toggleCartDropdown()">
        <svg class="cart-icon" viewBox="0 0 24 24" width="28" height="28">
          <path
            d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"
            fill="currentColor"
          />
        </svg>
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </div>

      <!-- Cart Dropdown -->
      <div class="cart-dropdown" *ngIf="showCartDropdown">
        <div class="cart-dropdown-header">
          <h3>Mi Carrito</h3>
          <span class="cart-item-count">{{ cartCount }} productos</span>
        </div>
        <div class="cart-dropdown-body">
          <div class="empty-cart" *ngIf="cartItems.length === 0">Tu carrito está vacío</div>
          <div class="cart-item" *ngFor="let item of cartItems">
            <div class="cart-item-info">
              <span class="cart-item-name">{{ item.name }}</span>
              <span class="cart-item-qty">Cantidad: {{ item.quantity }}</span>
            </div>
            <button class="btn-remove" (click)="removeFromCart(item.productId)">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <div class="hero-text">
        <h1>TechStore</h1>
        <p>Tu tienda de tecnología favorita</p>
      </div>
      <div class="hero-image">
        <svg viewBox="0 0 64 64" width="120" height="120">
          <rect
            x="8"
            y="12"
            width="48"
            height="32"
            rx="2"
            fill="#fff"
            stroke="#1a73e8"
            stroke-width="2"
          />
          <rect x="12" y="16" width="40" height="24" fill="#e3f2fd" />
          <path d="M4 44 L60 44 L56 50 L8 50 Z" fill="#1a73e8" />
          <rect x="28" y="50" width="8" height="4" fill="#0d47a1" />
        </svg>
      </div>
    </div>
  </header>

  <main style="padding: 2rem">
    <router-outlet (activate)="refreshCart()"></router-outlet>
  </main>
</div>
